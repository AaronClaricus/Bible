<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./Code/favicon.ico">
    <title>The Holy Bible in English, Greek, Latin and Arabic</title>
    <link rel="stylesheet" href="./Code/style25.css">
    <link rel="stylesheet" href="./Code/stylesearch.css">
    <style>
.file-link{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:inherit;
    padding:2px;
    cursor:pointer;
    word-break:break-word;
}

#fontSelector {
  height:32px;

    padding:0 14px;
    margin-left:8px;

    font-size:13px;
    font-weight:bold;
    font-family:Arial, sans-serif;

    color:white;

    background:linear-gradient(to bottom,#777,#444);

    border:none;
    border-radius:8px;
width:215px;
    cursor:pointer;

    box-shadow:0 2px 6px rgba(0,0,0,0.35);}
    #highlightSelector {
  height:32px;

    padding:0 14px;
    margin-left:8px;

    font-size:13px;
    font-weight:bold;
    font-family:Arial, sans-serif;

    color:white;

    background:linear-gradient(to bottom,#777,#444);

    border:none;
    border-radius:8px;

    cursor:pointer;
width:215px;
    box-shadow:0 2px 6px rgba(0,0,0,0.35);}
    #toggleInfo{
    height:32px;

    padding:0 14px;
    margin-left:8px;

    font-size:13px;
    font-weight:bold;
    font-family:Arial,sans-serif;

    color:white;

    background:
        linear-gradient(
            to bottom,
            #666,
            #444
        );

    border:none;
    border-radius:8px;

    cursor:pointer;

    box-shadow:
        0 2px 6px rgba(0,0,0,0.35);

    transition:
        transform 0.08s ease,
        filter 0.2s ease,
        box-shadow 0.2s ease;
}

#toggleInfo:hover{
    filter:brightness(1.08);

    box-shadow:
        0 3px 8px rgba(0,0,0,0.45);
}

#toggleInfo:active{
    transform:scale(0.96);
}

/* hidden state */
.hidden-info{
    display:none !important;
}
.hidden-controls{
    display:none !important;
}

/* =========================================
   TOGGLE CONTROLS BUTTON
========================================= */
#toggleControls{
    height:32px;

    padding:0 14px;
	margin:10px;
    margin-left:8px;
width:215px;
    font-size:13px;
    font-weight:bold;
    font-family:Arial,sans-serif;

    color:white;

    background:
        linear-gradient(
            to bottom,
            #666,
            #444
        );

    border:none;
    border-radius:8px;

    cursor:pointer;

    box-shadow:
        0 2px 6px rgba(0,0,0,0.35);

    transition:
        transform 0.08s ease,
        filter 0.2s ease,
        box-shadow 0.2s ease;
}

#toggleControls:hover{
    filter:brightness(1.08);

    box-shadow:
        0 3px 8px rgba(0,0,0,0.45);
}

#toggleControls:active{
    transform:scale(0.96);
}

/* =========================================
   HIDDEN CONTROLS
========================================= */
.hidden-controls{
    display:none !important;

    </style>
</head>

<body class="four-panel">
    <div id="main">
		
        <!-- NAVIGATION (outside table now) -->
        <aside id="navA" class="nav-column">
			<button id="toggleControls">
				Hide Controls
			</button>
            <div class="nav-controls">
				<button id="toggleSearch">
					Hide Search
				</button>
				<button id="toggleGo">
					Hide Go
				</button>
                <select id="fontSelector">
                    <option value="12px" selected>12px</option>
                    <option value="14px">14px</option>
                    <option value="16px">16px</option>
                    <option value="18px">18px</option>
                    <option value="20px">20px</option>
                    <option value="22px">22px</option>
                    <option value="24px">24px</option>
                </select>

                <select id="highlightSelector">
                    <option value="blue">Blue Highlight</option>
                    <option value="green" selected>Green Highlight</option>
                    <option value="yellow">Yellow Highlight</option>
                    <option value="orange">Orange Highlight</option>
                    <option value="purple">Purple Highlight</option>
                    <option value="lightgreen">Light Green Highlight</option>
                </select>

                <button id="layoutToggle">
                    Switch to 3 Panel Mode
                </button>
            </div>

            <!-- NAV INJECT HERE -->
        </aside>

        <!-- 4 IFRAME LAYOUT -->
        <table id="layouttable">
            <tr>
                <td class="left-item"><div class="search-row">
					
				<input id="search" type="text" placeholder="Search text..."><span id="countB">0/0</span>
					<input id="go" type="button" value="Go">
</div>
                    <div class="iframe-title" id="titleB">A </div>
                    <iframe id="frameB"></iframe>
                </td>

                <td class="center-col2"><div class="search-row">
					<input id="searchC" type="text" placeholder="Search C"><span id="countC">0/0</span>
<input id="goC" type="button" value="Go"></div>
                    <div class="iframe-title" id="titleC">B</div>
                    <iframe id="frameC"></iframe>
                </td>

                <td class="center-col"><div class="search-row">
					<input id="searchD" type="text" placeholder="Search D"><span id="countD">0/0</span>
<input id="goD" type="button" value="Go"></div>
                    <div class="iframe-title" id="titleD">C</div>
                    <iframe id="frameD"></iframe>
                </td>

                <td class="right-item"><div class="search-row">
					<input id="searchE" type="text" placeholder="Search E"><span id="countE">0/0</span>
<input id="goE" type="button" value="Go"></div>
                    <div class="iframe-title" id="titleE">D</div>
                    <iframe id="frameE"></iframe>
                </td>
                
            </tr>
        </table>

    </div>
</body>
<script>
document.addEventListener(
    "DOMContentLoaded",
    () => {

        const toggleControls =
            document.getElementById(
                "toggleControls"
            );

        const navControls =
            document.querySelector(
                ".nav-controls"
            );

        if(
            !toggleControls ||
            !navControls
        ){
            return;
        }

        toggleControls.addEventListener(
            "click",
            () => {

                navControls.classList.toggle(
                    "hidden-controls"
                );

                toggleControls.textContent =
                    navControls.classList.contains(
                        "hidden-controls"
                    )
                    ? "Show Controls"
                    : "Hide Controls";
            }
        );

    }
);

</script>
